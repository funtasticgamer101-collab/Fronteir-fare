<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meal Planner</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E65100">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍲 Comfort Meal Planner</h1>
        <p class="serving-badge">Scaled for 1 Serving</p>
        <nav>
            <button id="tab-plan" class="active">Meal Plan</button>
            <button id="tab-groceries">Grocery List</button>
        </nav>
    </header>

    <main>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Curating your 1-serving comfort food menu...</p>
        </div>

        <!-- Meal Plan Section -->
        <section id="view-plan" class="view active">
            <div class="week-container">
                <h2>Week 1</h2>
                <div class="grid" id="week-1-grid"></div>
            </div>
            <div class="week-container">
                <h2>Week 2</h2>
                <div class="grid" id="week-2-grid"></div>
            </div>
        </section>

        <!-- Grocery List Section -->
        <section id="view-groceries" class="view">
            <div class="grocery-container">
                <h2>🛒 Consolidated Shopping List</h2>
                <p class="subtitle">Everything you need for 1 person for 2 weeks.</p>
                <ul id="grocery-list"></ul>
            </div>
        </section>
    </main>

    <!-- Recipe Modal -->
    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Recipe Title</h2>
            <img id="modal-img" src="" alt="Recipe Image">
            <h3>Ingredients (1 Serving)</h3>
            <ul id="modal-ingredients"></ul>
            <h3>Instructions</h3>
            <p id="modal-instructions"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
