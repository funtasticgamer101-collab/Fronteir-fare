<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frontier Fare | Weekly Meal Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1 class="app-title">Frontier Fare</h1>
        <div class="week-indicator" id="week-indicator">Loading week...</div>
    </header>

    <main>
        <div id="planner-view" class="view-section active">
            <div id="planner-container"></div>
        </div>
        <div id="grocery-view" class="view-section">
            <h2 class="day-title" style="margin-bottom: 16px;">Weekly Provisions</h2>
            <div id="grocery-container"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('planner', this)">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            Planner
        </div>
        <div class="nav-item" onclick="switchTab('grocery', this)">
            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            Grocery
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
